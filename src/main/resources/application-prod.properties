# =============================================
# PRODUCTION CONFIG — Used by Railway
# All values are injected as environment variables
# =============================================

# PostgreSQL database (Railway provides DATABASE_URL automatically)
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Server port (Railway injects PORT env var)
server.port=${PORT:8080}

# CORS — set to your Netlify domain once deployed
cors.allowed-origins=${CORS_ORIGINS:*}

# File Upload
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

# Disable H2 console in prod
spring.h2.console.enabled=false
